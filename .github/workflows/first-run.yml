name: First Run — Auto-Onboard
on:
  issues:
    types: [opened]
    types: [labeled]
  discussion:
    types: [created]

jobs:
  onboard:
    name: Auto-Reply with Quickstart
    if: contains(github.event.issue.labels.*.name, 'question') || contains(github.event.issue.labels.*.name, 'help-wanted')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🚀 Claude x Mauxx AI — Quickstart

            Thanks for reaching out! Here's how to get started:

            \`\`\`bash
            # One command
            npx claude-x-mauxx-ai

            # Or install globally:
            npm install -g claude-x-mauxx-ai
            \`\`\`

            ### First Run
            On first run, it auto-detects your project structure, scans all .md files, and starts working.

            ### Presets
            For specific project types:
            \`\`\`bash
            claude --config .claude/settings.json --preset webapp-fullstack
            \`\`\`

            Available presets: \`webapp-fullstack\`, \`api-microservice\`, \`security-audit\`, \`perf-tuning\`

            ### Cost Control
            The system auto-routes tasks to the cheapest model (Haiku for triage, Sonnet for code, Opus for architecture).
            Default budget: $50/month. Configurable in \`.claude/settings.json\`.

            ### Docs
            - [README](https://github.com/rajmodi135/Claude-X-Mauxx-AI#readme)
            - [SMART_FEATURES_ROADMAP](https://github.com/rajmodi135/Claude-X-Mauxx-AI/blob/main/SMART_FEATURES_ROADMAP.md)
            - [INSTALL](https://github.com/rajmodi135/Claude-X-Mauxx-AI/blob/main/INSTALL.md)

            Let me know if you need more help!
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
